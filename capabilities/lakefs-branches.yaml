    resources:
    - name: repositories-repository-branches
      path: /repositories/{repository}/branches
      operations:
      - name: listbranches
        method: GET
        description: list branches
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:

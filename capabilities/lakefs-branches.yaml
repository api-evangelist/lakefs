        - name: result
          type: object
          value: $.
      - name: deletebranch
        method: DELETE
        description: delete branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: force
          in: query
          type: boolean
      - name: resetbranch
        method: PUT
        description: reset branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repositories-repository-branches-branch-cherry-pick
      path: /repositories/{repository}/branches/{branch}/cherry-pick
      operations:
      - name: cherrypick
        method: POST
        description: Replay the changes from the given commit on the branch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repositories-repository-branches-branch-diff
      path: /repositories/{repository}/branches/{branch}/diff
      operations:
      - name: diffbranch
        method: GET
        description: diff branch
        outputRawFormat: json

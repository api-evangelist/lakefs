        - type: object
          mapping: $.
      - method: POST
        name: createbranch
        description: create branch
        call: lakefs-branches.createbranch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{repository}/branches/{branch}

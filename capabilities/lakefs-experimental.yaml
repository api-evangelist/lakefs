      - method: POST
        name: externalprincipallogin
        description: perform a login using an external authenticator
        call: lakefs-experimental.externalprincipallogin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/external/principals
